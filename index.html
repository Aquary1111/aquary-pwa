<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06131b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aquary">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Aquary 🐟</title>
<style>
  /* GAS版(Styles.html)に配色・コンポーネントを合わせる。--accent/--good は既存コードのエイリアス。 */
  :root{
    --bg:#071016; --bg2:#02090D; --card:#12202A; --card2:#1B2B37; --card3:#263A48;
    --border:#2B4658; --border2:#3A5C70;
    --teal:#00C9E4; --teal2:#007A8C; --tg:rgba(0,201,228,.15);
    --green:#3DDB7C; --yellow:#F5C842; --orange:#F07830; --red:#E85555; --purple:#9B7BE8;
    --text:#EEF8FC; --sub:#A7C5D4; --dim:#7898AA;
    --accent:#00C9E4; --good:#3DDB7C;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Yu Gothic UI','Meiryo',sans-serif;font-size:14px;line-height:1.5;overscroll-behavior:none}
  body{padding:env(safe-area-inset-top) 0 calc(72px + env(safe-area-inset-bottom)) 0;min-height:100vh}
  ::-webkit-scrollbar{width:3px;height:3px}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  header{position:sticky;top:0;background:var(--bg2);backdrop-filter:blur(16px);padding:12px 16px 10px;display:flex;align-items:center;gap:10px;z-index:100;border-bottom:1px solid var(--border);max-width:480px;margin:0 auto}
  header h1{font-size:18px;margin:0;font-weight:900;letter-spacing:-.02em}
  header .who{margin-left:auto;font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px}
  header img.av,header .av{width:30px;height:30px;border-radius:50%;object-fit:cover;background:linear-gradient(135deg,var(--teal2),var(--teal))}
  main{padding:14px 16px;max-width:480px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
  .card h2{font-size:14px;margin:0 0 10px;color:var(--sub);font-weight:700}
  .row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .row .ttl{font-weight:700}
  .row .meta{font-size:12px;color:var(--dim)}
  .thumb{width:48px;height:48px;border-radius:12px;object-fit:cover;background:var(--card2);flex-shrink:0}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--tg);border:none;color:var(--teal)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .enc{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .enc img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--card2)}
  .enc .b{padding:8px 10px}
  .enc .nm{font-weight:700;font-size:13px;line-height:1.3}
  .enc .sci{font-size:11px;color:var(--dim);font-style:italic}
  button{font-family:inherit}
  .btn{background:var(--teal);color:#001014;border:none;border-radius:12px;font-weight:700;padding:11px 18px;cursor:pointer;font-size:14px;transition:opacity .15s}
  .btn:active{opacity:.7}
  .btn.sec{background:var(--card2);color:var(--text);border:1px solid var(--border)}
  .btn.full{display:block;width:100%}
  .inp{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
  .inp:focus{border-color:var(--teal)}
  nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;background:rgba(4,10,14,.93);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(12px + env(safe-area-inset-bottom));backdrop-filter:blur(16px);z-index:200}
  nav button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0}
  nav button .ic{width:40px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .2s;position:relative}
  nav button .ni{font-size:18px;color:var(--dim);line-height:1}
  nav button .nl{font-size:10px;color:var(--dim)}
  nav button.on .ic{background:var(--tg)}
  nav button.on .ni{color:var(--teal)}
  nav button.on .nl{color:var(--teal);font-weight:700}
  .nav-badge{display:none;position:absolute;top:-3px;right:-2px;background:var(--red);color:#fff;border-radius:999px;min-width:15px;height:15px;line-height:15px;font-size:9px;font-weight:800;text-align:center;padding:0 3px}
  /* ハンバーガー＋左ドロワー（GAS準拠） */
  .menu-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:10px;font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
  #drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;visibility:hidden;transition:opacity .2s}
  #drawer-overlay.open{opacity:1;visibility:visible}
  #drawer{position:fixed;top:0;left:0;height:100%;width:80%;max-width:300px;background:var(--bg2);border-right:1px solid var(--border);z-index:301;transform:translateX(-103%);transition:transform .22s ease;display:flex;flex-direction:column;box-shadow:2px 0 18px rgba(0,0,0,.45)}
  #drawer.open{transform:translateX(0)}
  #drawer-head{display:flex;align-items:center;gap:12px;padding:22px 18px 16px;border-bottom:1px solid var(--border)}
  #drawer-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--teal2),var(--teal));display:flex;align-items:center;justify-content:center;font-size:23px;overflow:hidden;flex-shrink:0}
  #drawer-avatar img{width:100%;height:100%;object-fit:cover}
  #drawer-menu{padding:10px 12px;display:flex;flex-direction:column;gap:4px;overflow:auto}
  .drawer-item{display:flex;align-items:center;gap:14px;width:100%;background:none;border:none;color:var(--text);font-family:inherit;font-size:15px;font-weight:700;text-align:left;padding:13px 12px;border-radius:12px;cursor:pointer}
  .drawer-item:active{background:var(--card2)}
  .drawer-item .di-ic{font-size:18px;width:24px;text-align:center;color:var(--teal)}
  .center{min-height:60vh;display:grid;place-items:center;text-align:center;padding:24px}
  .spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .muted{color:var(--sub);font-size:13px}
  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--card);border:1px solid var(--border2);color:var(--text);padding:11px 16px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;max-width:90vw;box-shadow:0 8px 24px #0008}
  .toast.err{border-color:rgba(232,85,85,.4);color:#ffd9d9;background:rgba(232,85,85,.18)}
  .offline{background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.3);color:var(--yellow);font-size:12px;padding:8px 12px;border-radius:10px;margin-bottom:12px}
  a{color:var(--teal)}
</style>
</head>
<body>
<header>
  <button class="menu-btn" id="menu-btn" aria-label="メニュー" style="display:none">☰</button>
  <h1>Aquary 🐟</h1>
  <div class="who" id="who"></div>
</header>
<main id="app">
  <div class="center"><div class="spin"></div></div>
</main>
<nav id="nav" style="display:none">
  <button data-tab="home" class="on"><div class="ic"><span class="ni">⌂</span></div><span class="nl">ホーム</span></button>
  <button data-tab="tanks"><div class="ic"><span class="ni">◈</span></div><span class="nl">水槽</span></button>
  <button data-tab="public"><div class="ic"><span class="ni">◉</span></div><span class="nl">公開水槽</span></button>
  <button data-tab="enc"><div class="ic"><span class="ni">⊞</span></div><span class="nl">図鑑</span></button>
  <button data-tab="activity"><div class="ic"><span class="ni">♡</span><span class="nav-badge" id="nav-badge"></span></div><span class="nl">通知</span></button>
</nav>
<div id="drawer-overlay"></div>
<div id="drawer" aria-hidden="true">
  <div id="drawer-head">
    <div id="drawer-avatar">🐟</div>
    <div style="min-width:0"><div id="drawer-name" style="font-weight:800;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">ユーザー</div><div id="drawer-sub" style="color:var(--sub);font-size:12px"></div></div>
  </div>
  <div id="drawer-menu"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
