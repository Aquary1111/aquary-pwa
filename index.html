<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06131b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aquary">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Aquary 🐟</title>
<style>
  :root{
    --bg:#06131b; --card:#0c2330; --card2:#0a1c27; --border:#16384a;
    --text:#eaf8ff; --sub:#9fc4d5; --dim:#5f8497; --accent:#08c6df; --red:#ff6b6b; --good:#3ad29f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;-webkit-tap-highlight-color:transparent}
  body{padding:env(safe-area-inset-top) 0 calc(64px + env(safe-area-inset-bottom)) 0;min-height:100vh}
  header{position:sticky;top:0;background:linear-gradient(180deg,#06131b,#06131bdd);backdrop-filter:blur(8px);padding:16px 16px 10px;display:flex;align-items:center;gap:10px;z-index:5}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.5px}
  header .who{margin-left:auto;font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px}
  header img.av{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#0a1c27}
  main{padding:8px 16px;max-width:560px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
  .card h2{font-size:14px;margin:0 0 10px;color:var(--sub);font-weight:700}
  .row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .row .ttl{font-weight:700}
  .row .meta{font-size:12px;color:var(--dim)}
  .thumb{width:48px;height:48px;border-radius:10px;object-fit:cover;background:var(--card2);flex-shrink:0}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;background:#0a1c27;border:1px solid var(--border);color:var(--sub)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .enc{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .enc img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--card2)}
  .enc .b{padding:8px 10px}
  .enc .nm{font-weight:700;font-size:13px;line-height:1.3}
  .enc .sci{font-size:11px;color:var(--dim);font-style:italic}
  button{font-family:inherit}
  .btn{background:var(--accent);color:#00151d;border:none;border-radius:10px;font-weight:800;padding:12px 16px;cursor:pointer;font-size:14px}
  .btn.sec{background:transparent;color:var(--sub);border:1px solid var(--border)}
  .btn.full{display:block;width:100%}
  nav{position:fixed;left:0;right:0;bottom:0;background:#08161fee;border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));backdrop-filter:blur(8px)}
  nav button{flex:1;background:none;border:none;color:var(--dim);font-size:11px;padding:6px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button.on{color:var(--accent)}
  nav .ic{font-size:20px;line-height:1}
  .center{min-height:60vh;display:grid;place-items:center;text-align:center;padding:24px}
  .spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .muted{color:var(--dim);font-size:13px}
  .toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#0c2330;border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:10px;font-size:13px;z-index:20;max-width:90vw;box-shadow:0 8px 24px #0008}
  .toast.err{border-color:var(--red);color:#ffd9d9}
  .offline{background:#3a2a0a;border:1px solid #6b520a;color:#ffe6a8;font-size:12px;padding:8px 12px;border-radius:10px;margin-bottom:12px}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>Aquary 🐟</h1>
  <div class="who" id="who"></div>
</header>
<main id="app">
  <div class="center"><div class="spin"></div></div>
</main>
<nav id="nav" style="display:none">
  <button data-tab="home" class="on"><span class="ic">🏠</span>ホーム</button>
  <button data-tab="enc"><span class="ic">📖</span>図鑑</button>
  <button data-tab="account"><span class="ic">⚙️</span>アカウント</button>
</nav>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
